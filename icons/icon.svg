<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c26"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="50%" stop-color="#8b6ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="124" height="124" rx="26" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Neural network connections (subtle lines) -->
  <g stroke="#6c5ce7" stroke-width="0.5" stroke-opacity="0.2">
    <line x1="10" y1="50" x2="30" y2="40"/>
    <line x1="30" y1="40" x2="50" y2="48"/>
    <line x1="10" y1="80" x2="28" y2="85"/>
    <line x1="28" y1="85" x2="50" y2="78"/>
    <line x1="50" y1="48" x2="50" y2="78"/>
    <line x1="118" y1="45" x2="98" y2="55"/>
    <line x1="98" y1="55" x2="78" y2="50"/>
    <line x1="118" y1="85" x2="100" y2="80"/>
    <line x1="100" y1="80" x2="78" y2="82"/>
    <line x1="78" y1="50" x2="78" y2="82"/>
    <line x1="50" y1="48" x2="78" y2="50"/>
    <line x1="50" y1="78" x2="78" y2="82"/>
  </g>

  <!-- Neural network nodes -->
  <g fill="#a855f7" opacity="0.4">
    <circle cx="10" cy="50" r="3"/><circle cx="30" cy="40" r="3"/>
    <circle cx="50" cy="48" r="3"/><circle cx="10" cy="80" r="3"/>
    <circle cx="28" cy="85" r="3"/><circle cx="50" cy="78" r="3"/>
    <circle cx="118" cy="45" r="3"/><circle cx="98" cy="55" r="3"/>
    <circle cx="78" cy="50" r="3"/><circle cx="118" cy="85" r="3"/>
    <circle cx="100" cy="80" r="3"/><circle cx="78" cy="82" r="3"/>
  </g>

  <!-- Active nodes (bright) -->
  <g fill="#c4b5fd" filter="url(#glow)">
    <circle cx="64" cy="63" r="2.5"/>
    <circle cx="50" cy="48" r="2"/>
    <circle cx="78" cy="50" r="2"/>
    <circle cx="50" cy="78" r="2"/>
    <circle cx="78" cy="82" r="2"/>
  </g>

  <!-- "AI" text -->
  <text x="64" y="74" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="42" font-weight="800" letter-spacing="-1" fill="url(#textGrad)" filter="url(#softGlow)">AI</text>

  <!-- Underline accent -->
  <rect x="38" y="84" width="52" height="3.5" rx="1.75" fill="#a855f7" filter="url(#glow)"/>

  <!-- Corner sparkles -->
  <g fill="#c4b5fd" opacity="0.7">
    <circle cx="22" cy="26" r="2"/>
    <circle cx="106" cy="22" r="1.8"/>
    <circle cx="18" cy="100" r="1.5"/>
    <circle cx="110" cy="106" r="2"/>
  </g>
</svg>
