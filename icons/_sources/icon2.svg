<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c26"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="chat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="124" height="124" rx="26" fill="url(#bg)"/>
  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="#6c5ce7" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Chat bubble -->
  <rect x="22" y="24" width="84" height="60" rx="14" fill="url(#chat)" opacity="0.9"/>
  <!-- Bubble tail -->
  <polygon points="32,84 50,84 28,100" fill="#a855f7" opacity="0.85"/>
  <!-- AI inside bubble -->
  <text x="64" y="64" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="28" font-weight="800" fill="#ffffff">AI</text>
  <!-- Glow dots -->
  <circle cx="38" cy="38" r="2" fill="#c4b5fd" filter="url(#glow)"/>
  <circle cx="90" cy="42" r="1.5" fill="#c4b5fd" filter="url(#glow)"/>
  <circle cx="64" cy="20" r="2" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="110" cy="70" r="1.8" fill="#a855f7" filter="url(#glow)"/>
</svg>
