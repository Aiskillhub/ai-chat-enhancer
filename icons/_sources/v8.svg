<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4b3bd0"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#12102a"/>
  <!-- Magic wand -->
  <g transform="translate(48,62) rotate(-30)">
    <!-- Wand shaft -->
    <rect x="-4" y="-30" width="8" height="60" rx="4" fill="url(#g)" filter="url(#glow)"/>
    <!-- Wand tip (star) -->
    <polygon points="0,-36 8,-20 24,-16 12,-6 14,12 0,0 -14,12 -12,-6 -24,-16 -8,-20" fill="url(#g2)" filter="url(#glow)"/>
  </g>
  <!-- Sparkle trail particles -->
  <g fill="#a855f7" filter="url(#glow)">
    <circle cx="82" cy="34" r="3"/>
    <circle cx="96" cy="42" r="2"/>
    <circle cx="76" cy="48" r="2.5"/>
    <circle cx="90" cy="28" r="1.5"/>
    <circle cx="68" cy="40" r="1.5"/>
  </g>
</svg>
