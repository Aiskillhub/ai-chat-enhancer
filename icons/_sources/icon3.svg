<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c26"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="124" height="124" rx="26" fill="url(#bg)"/>
  <!-- Hexagon -->
  <polygon points="64,18 104,42 104,86 64,110 24,86 24,42" fill="none" stroke="url(#hex)" stroke-width="3" opacity="0.7"/>
  <!-- Inner hex -->
  <polygon points="64,30 96,49 96,79 64,98 32,79 32,49" fill="url(#hex)" opacity="0.15"/>
  <!-- AI text -->
  <text x="64" y="75" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="36" font-weight="800" fill="#ffffff" filter="url(#glow)">AI</text>
  <!-- Hex corner dots -->
  <circle cx="64" cy="18" r="4" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="104" cy="42" r="3" fill="#6c5ce7"/>
  <circle cx="104" cy="86" r="3" fill="#6c5ce7"/>
  <circle cx="64" cy="110" r="4" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="24" cy="86" r="3" fill="#6c5ce7"/>
  <circle cx="24" cy="42" r="3" fill="#6c5ce7"/>
</svg>
