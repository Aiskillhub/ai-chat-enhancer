<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#8b6ce7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b6ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#0f0c26"/>
  <!-- Overlapping gradient circles (Vercel-style) -->
  <circle cx="48" cy="50" r="32" fill="url(#g1)" opacity="0.85"/>
  <circle cx="80" cy="78" r="32" fill="url(#g2)" opacity="0.85"/>
  <!-- The overlap creates a nice lens effect naturally -->
  <!-- A small sparkle at the intersection -->
  <g transform="translate(64,64)" fill="#fff" filter="url(#glow)">
    <polygon points="0,-8 1.5,-2 8,0 1.5,2 0,8 -1.5,2 -8,0 -1.5,-2"/>
  </g>
</svg>
