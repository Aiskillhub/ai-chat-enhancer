<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#12102a"/>
  <!-- Large sparkle as main icon -->
  <g transform="translate(64,64)" fill="url(#g)" filter="url(#glow)">
    <!-- 4-point star -->
    <polygon points="0,-42 10,-8 42,0 10,8 0,42 -10,8 -42,0 -10,-8"/>
  </g>
  <!-- Inner white sparkle -->
  <g transform="translate(64,64)" fill="#fff" opacity="0.9">
    <polygon points="0,-14 3.5,-3 14,0 3.5,3 0,14 -3.5,3 -14,0 -3.5,-3"/>
  </g>
</svg>
