<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Dark bg -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#0e0a24"/>
  <!-- Abstract "A" formed by two angled bars + cross -->
  <g transform="translate(64,68)" stroke="url(#g)" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#glow)">
    <!-- Left leg -->
    <line x1="-14" y1="22" x2="-26" y2="-28"/>
    <!-- Right leg -->
    <line x1="14" y1="22" x2="26" y2="-28"/>
    <!-- Cross bar -->
    <line x1="-18" y1="-2" x2="18" y2="-2"/>
  </g>
  <!-- Top sparkle dot -->
  <circle cx="64" cy="36" r="5" fill="url(#g)" filter="url(#glow)"/>
</svg>
