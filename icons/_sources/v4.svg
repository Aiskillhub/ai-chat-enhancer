<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background circle (instead of rounded rect - cleaner) -->
  <circle cx="64" cy="64" r="56" fill="#13102e"/>
  <!-- Chat bubble outline -->
  <path d="M38,38 h40 c8,0 14,6 14,14 v20 c0,8 -6,14 -14,14 h-28 l-12,12 v-12 c-6,0 -10,-6 -10,-14 v-20 c0,-8 4,-14 10,-14 z" fill="none" stroke="url(#g)" stroke-width="5" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Arrow up (enhance symbol) inside -->
  <g transform="translate(64,60)" stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <line x1="0" y1="12" x2="0" y2="-12"/>
    <polyline points="-8,-4 0,-14 8,-4"/>
  </g>
</svg>
