<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#0a1628"/>
  <!-- Large sparkle -->
  <g transform="translate(64,64)" fill="url(#g)" filter="url(#glow)">
    <polygon points="0,-42 10,-8 42,0 10,8 0,42 -10,8 -42,0 -10,-8"/>
  </g>
  <g transform="translate(64,64)" fill="#fff" opacity="0.9">
    <polygon points="0,-12 3,-2.5 12,0 3,2.5 0,12 -3,2.5 -12,0 -3,-2.5"/>
  </g>
</svg>
