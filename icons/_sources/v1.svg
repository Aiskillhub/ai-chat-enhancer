<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#151030"/>
  <!-- Chat bubble: body + tail -->
  <g transform="translate(64,58)" fill="url(#g)" filter="url(#glow)">
    <rect x="-36" y="-28" width="72" height="52" rx="14"/>
    <polygon points="-22,24 -4,24 -20,40"/>
  </g>
  <!-- Sparkle inside bubble -->
  <g transform="translate(64,58)" fill="#fff" filter="url(#glow)">
    <polygon points="0,-12 2.5,-3 12,0 2.5,3 0,12 -2.5,3 -12,0 -2.5,-3"/>
  </g>
</svg>
