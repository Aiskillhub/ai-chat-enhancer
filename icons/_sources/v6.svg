<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#12102a"/>
  <!-- Interlocking rings (AI/network concept) -->
  <g fill="none" stroke-width="6" stroke-linecap="round" filter="url(#glow)">
    <circle cx="44" cy="60" r="24" stroke="#6c5ce7"/>
    <circle cx="84" cy="60" r="24" stroke="#a855f7"/>
    <!-- The overlap creates a lens/blend in the middle -->
  </g>
  <!-- Center sparkle in the overlap -->
  <circle cx="64" cy="60" r="6" fill="url(#g)" filter="url(#glow)"/>
</svg>
