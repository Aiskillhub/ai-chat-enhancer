<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bgGlow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </radialGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#e2b0ff"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="124" height="124" rx="26" fill="url(#bgGlow)"/>
  <!-- 4-point sparkle (big) -->
  <g transform="translate(64,44)" fill="url(#sparkle)" filter="url(#glow2)">
    <polygon points="0,-24 5,-4 24,0 5,4 0,24 -5,4 -24,0 -5,-4"/>
  </g>
  <!-- AI below sparkle -->
  <text x="64" y="90" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="34" font-weight="800" letter-spacing="0" fill="#ffffff">AI</text>
  <!-- subtitle -->
  <text x="64" y="112" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#a855f7" opacity="0.7">ENHANCER</text>
</svg>
