<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#12102a"/>
  <!-- Brain silhouette with nodes -->
  <g transform="translate(64,62)" fill="none" stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Brain outline (simplified) -->
    <path d="M-30,0 C-30,-24,-16,-36,0,-36 C12,-36,22,-28,26,-16 M26,-16 C26,-28,34,-36,44,-30 C50,-26,52,-18,48,-12 M30,0 C30,14,20,26,6,28 C-6,28,-18,22,-24,14"/>
    <!-- connecting lines -->
    <line x1="-12" y1="-14" x2="12" y2="-14"/>
    <line x1="-18" y1="-4" x2="18" y2="-4"/>
    <line x1="-10" y1="6" x2="10" y2="6"/>
  </g>
  <!-- Nodes -->
  <g fill="#fff" filter="url(#glow)">
    <circle cx="38" cy="44" r="3.5"/>
    <circle cx="50" cy="28" r="3.5"/>
    <circle cx="90" cy="46" r="3.5"/>
    <circle cx="52" cy="48" r="2.5"/>
    <circle cx="76" cy="48" r="2.5"/>
    <circle cx="52" cy="58" r="2.5"/>
    <circle cx="76" cy="58" r="2.5"/>
    <circle cx="54" cy="68" r="2.5"/>
    <circle cx="74" cy="68" r="2.5"/>
  </g>
</svg>
